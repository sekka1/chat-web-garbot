# Garbot Chat - garbot.managedkube.com
# HTTP to HTTPS redirect + Let's Encrypt ACME challenge
<VirtualHost *:80>
    ServerName garbot.managedkube.com

    # Allow Let's Encrypt ACME challenges
    Alias /.well-known/acme-challenge/ /opt/bitnami/apps/letsencrypt/.well-known/acme-challenge/
    <Directory "/opt/bitnami/apps/letsencrypt">
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Redirect everything else to HTTPS
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# HTTPS - proxy to Node.js app on port 3000
<VirtualHost *:443>
    ServerName garbot.managedkube.com

    SSLEngine on
    SSLCertificateFile "/opt/bitnami/apache2/conf/garbot.managedkube.com.crt"
    SSLCertificateKeyFile "/opt/bitnami/apache2/conf/garbot.managedkube.com.key"

    # Modern TLS settings
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder on

    # Security headers
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set Referrer-Policy "no-referrer-when-downgrade"

    # Proxy to Node.js
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # WebSocket support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3000/$1 [P,L]
</VirtualHost>
